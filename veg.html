<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Veg Burgers</title>

<style>

body{
background:#1c1c1c;
color:white;
font-family:Arial;
}

.products{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
margin:40px;
}

.card{
background:#2c2c2c;
width:22%;
padding:15px;
text-align:center;
border-radius:10px;
margin-bottom:20px;
}

.card img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#ffc107;
}

.buy{
background:#ff5722;
color:white;
}

</style>

</head>

<body>

<h1 style="text-align:center;">Veg Burgers 🥬</h1>

<div class="products">

<div class="card">
<h2>Classic Veg Burger</h2>
<img src="images/veg.jpg">
<p>₹99 Only</p>

<button class="add" onclick="addToCart('Classic Veg Burger',99)">Add to Cart</button>
<button class="buy" onclick="buyNow('Classic Veg Burger',99)">Buy Now</button>

</div>

<div class="card">
<h2>Paneer Tikka Burger</h2>
<img src="C:\Users\sai charan\OneDrive\Desktop\FWD HTML\images\Paneer Tikka Burger.jpg">
<p>₹119 Only</p>

<button class="add" onclick="addToCart('Paneer Tikka Burger',119)">Add to Cart</button>
<button class="buy" onclick="buyNow('Paneer Tikka Burger',119)">Buy Now</button>

</div>

</div>

<script>

let cart=[];

function addToCart(name,price){

cart.push({name,price});

alert(name + " added to cart");

}

function buyNow(name,price){

alert("Order placed for " + name + " ₹" + price);

}

</script>

</body>
</html>
