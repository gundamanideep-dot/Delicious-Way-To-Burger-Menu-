<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WAY TO BURGER</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;

        /* Background image */
        background-image: url("C:\Users\sai charan\OneDrive\Desktop\FWD HTML\images\burger-restaurant-logo-vector-template_621660-2613.avif");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        position: relative;
    }

    /* Dark mask so text is visible */
    body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        z-index: 0;
    }

    /* Keep content on top */
    h1, .box {
        position: relative;
        z-index: 1;
    }

    h1 {
        margin-bottom: 20px;
        letter-spacing: 2px;
        font-size: 32px;
        animation: fadeIn 1s ease-out;
    }

    .box {
        width: 340px;
        background: rgba(0,0,0,0.55);
        padding: 30px;
        border-radius: 12px;
        animation: fadeIn 0.8s;
        backdrop-filter: blur(5px);
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #82ccdd;
        color: black;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: white;
    }

    a {
        color: #dcdde1;
        text-decoration: none;
    }
</style>
</head>

<body>
<img src="C:\Users\sai charan\OneDrive\Desktop\FWD HTML\images\burger-restaurant-logo-vector-template_621660-2613.avif" class="logo" style="position:absolute; top:20px; left:20px; width:120px; z-index:1;">
<h1>WAY TO BURGER MENU</h1>

<div class="box">
    <h2 style="text-align: center;">Login</h2>

    <!-- Login form with JS validation -->
    <form onsubmit="return validateLogin()">
        <input type="text" id="user" placeholder="Enter Username" required>
        <input type="password" id="pass" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top:10px;">
        <a href="create-account.html">Create an Account</a>
    </p>
</div>

<script>
function validateLogin() {
    let enteredUser = document.getElementById("user").value;
    let enteredPass = document.getElementById("pass").value;

    // Get stored values
    let storedUser = localStorage.getItem("username");
    let storedPass = localStorage.getItem("password");

    if (enteredUser === storedUser && enteredPass === storedPass) {
        alert("Login Successful!");
        window.location.href = "FWD.html"; // or index.html
        return false;
    } else {
        alert("Invalid Username or Password!");
        return false;
    }
}
</script>


</body>
</html>
